version: '1.0'

networks:
    frontendnetwork:
    budgetnetwork:
    identitynetwork:

services:
    ui:
        build:
            context: /UI
        ports:
            - 8011:8080
        networks:
            - frontendnetwork

    apigateway:
        build:
            context: /ApiGateway
        ports:
            - 8010:8080
        networks:
            - frontendnetwork
            - budgetnetwork
            - identitynetwork

    budgetdb:
        image: mcr.microsoft.com/mssql/server:2019-latest
        environment:
            - SA_PASSWORD=tHiSiS_NoT@PAsSW&d
            - ACCEPT_EULA=Y
        ports:
            - 1433:1433
        volumes:
            - budget-db-data:/var/opt/mssql
        networks:
            - budgetnetwork

    budgetapi:
        image: jluka26/budgetmanager:latest
        build:
            context: /BudgetManager
        depends_on:
            - budgetdb
        environment:
            - db_host=budgetdb
            - db_name=BudgetDB
            - db_password=tHiSiS_NoT@PAsSW&d
            - db_port=1433
            - ASPNETCORE_ENVIRONMENT=Development
        networks:
            - budgetnetwork

    identitydb:
        image: postgres:16
        environment:
            - POSTGRES_DB=IdentityDB
            - POSTGRES_USER=identity
            - POSTGRES_PASSWORD=identitypasswd123
        volumes:
            - identity-db-data:/var/lib/postgresql/data
        networks:
            - identitynetwork
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U identity -d IdentityDB"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    identityapi:
        image: jluka26/identitymanager:latest
        build:
            context: /IdentityManager
        depends_on:
            identitydb:
                condition: service_healthy
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__DefaultConnection=Host=identitydb;Port=5432;Database=IdentityDB;Username=identity;Password=identitypasswd123
            - Jwt__Key=AppJwtSecretKey-ChangeInProduction-MinLength32!
            - Jwt__Issuer=http://identityapi:8080
            - Jwt__Audience=app
            - Jwt__ExpiryMinutes=60
            - Jwt__RefreshTokenExpiryDays=7
        networks:
            - identitynetwork
            - frontendnetwork

volumes:
  identity-db-data:
  budget-db-data:
